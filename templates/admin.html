{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="mb-4 text-center">Admin Panel - Donations</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Amount</th>
</tr>
</thead>

<tbody>

{% for donation in donations %}

<tr>
<td>{{ donation[0] }}</td>
<td>{{ donation[1] }}</td>
<td>{{ donation[2] }}</td>
<td>₹ {{ donation[3] }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
